<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>⚡ PUNK STUDY MENU ⚡</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Orbitron:wght@700;900&family=Black+Ops+One&display=swap');
    
    :root {
      --primary-color: #9b4dff; 
      --secondary-color: #ff0066; 
      --accent-color: #00f2ff; /* Cian eléctrico */
      --warning-color: #ffff00; /* Amarillo ácido */
      --background-dark: #050505;
      --font-main: 'Special Elite', monospace;
      --font-heading: 'Black Ops One', cursive;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      min-height: 100vh;
      background-color: var(--background-dark);
      /* Fondo con textura de papel viejo y ruido */
      background-image: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png'),
        radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%);
      color: #fff;
      font-family: var(--font-main);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* Animación de parpadeo punk */
    @keyframes glitch {
      0% { text-shadow: 2px 2px var(--secondary-color); }
      25% { text-shadow: -2px -2px var(--accent-color); }
      50% { text-shadow: 2px -2px var(--warning-color); }
      100% { text-shadow: 2px 2px var(--secondary-color); }
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      transform: rotate(-1deg);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 8vw, 3rem);
      color: var(--warning-color);
      background: var(--secondary-color);
      display: inline-block;
      padding: 5px 15px;
      margin-bottom: 10px;
      animation: glitch 0.3s infinite;
      text-transform: uppercase;
    }

    h2.subtitle {
      font-family: 'Orbitron';
      font-size: clamp(1rem, 5vw, 1.5rem);
      color: var(--accent-color);
      background: #000;
      display: block;
      width: fit-content;
      margin: 0 auto;
      border: 1px dashed var(--accent-color);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .menu-container {
      width: 100%;
      max-width: 450px;
      background: #111;
      padding: 30px 15px;
      border: 4px solid #fff;
      /* Borde "mordido" */
      clip-path: polygon(2% 0%, 100% 2%, 98% 95%, 0% 100%);
      box-shadow: 15px 15px 0 var(--primary-color);
    }

    .menu-title {
      background: var(--warning-color);
      color: #000;
      font-weight: 900;
      padding: 5px;
      margin-bottom: 25px;
      transform: rotate(2deg);
      text-align: center;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .boton-li {
      width: 100%;
    }

    /* Estilo de botón tipo "Parche de ropa" */
    .boton {
      width: 100%;
      background: #000;
      border: 2px solid var(--accent-color);
      padding: 15px;
      color: #fff;
      font-family: 'Orbitron';
      font-size: 1.1rem;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: 0.1s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .boton:nth-child(even) { transform: rotate(1.5deg); }
    .boton:nth-child(odd) { transform: rotate(-1.5deg); }

    .boton:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 20px var(--accent-color);
      transform: scale(1.05) rotate(0deg);
      z-index: 10;
    }

    .boton:active {
      transform: scale(0.95);
      background: var(--secondary-color);
    }

    footer {
      margin-top: 40px;
      text-align: center;
    }

    footer img {
      width: 220px;
      filter: contrast(150%) grayscale(100%) invert(0);
      border: 10px solid #fff;
      outline: 5px solid var(--secondary-color);
      transition: 0.3s;
    }

    footer img:hover {
      filter: contrast(110%) grayscale(0%);
      transform: scale(1.1) rotate(5deg);
    }

    /* Scanlines effect para pantalla vieja */
    body::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚡ CAOS & ESTUDIO ⚡</h1>
    <h2 class="subtitle">🎸 NO HAY FUTURO SI NO APRUEBAS 🎸</h2>
  </header>
  
  <main>
    <div class="menu-container">
      <h2 class="menu-title">-- EXPEDIENTES PROHIBIDOS --</h2>
      <ul>
        <li class="boton-li"><a href="cloud.html" class="boton">☠️ GENESYS CLOUD</a></li>
      </ul>
    </div>
  </main>

  <footer>
    <img src="Estudiante.png" alt="Punk Student">
    <p style="margin-top:10px; font-size: 0.8rem; color: var(--secondary-color)">STAY REBEL. STUDY HARD.</p>
  </footer>

</body>
</html>
