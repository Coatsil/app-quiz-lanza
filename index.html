<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Quiz App - Menú Principal</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --primary-color: #800080; /* purple */
      --secondary-color: #ffc0cb; /* pink */
      --background-start: #f0f8ff; /* aliceblue */
      --background-end: #add8e6; /* lightblue */
      --text-light: #f0f8ff; /* aliceblue */
      --font-main: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      
      /* Tamaños base responsivos - Optimizados para Samsung S52 */
      --base-font-size: clamp(18px, 5.5vw, 24px);
      --heading1-size: clamp(1.6rem, 7vw, 2.2rem);
      --heading2-size: clamp(1.3rem, 6vw, 1.8rem);
      --button-font-size: clamp(1rem, 4.8vw, 1.4rem);
      --element-spacing: clamp(0.4rem, 2vw, 1rem);
      --section-spacing: clamp(0.8rem, 3.5vw, 1.5rem);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, var(--background-start), var(--background-end));
      color: var(--primary-color);
      font-family: var(--font-main);
      font-size: var(--base-font-size);
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      line-height: 1.3;
    }
    
    header {
      text-align: center;
      margin-bottom: calc(var(--section-spacing) * 0.8);
      padding-top: 15px;
    }
    
    h1, h2 {
      color: var(--primary-color);
      margin-bottom: 8px;
      line-height: 1.2;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    
    h1 {
      font-size: var(--heading1-size);
      font-weight: bold;
    }
    
    h2 {
      font-size: var(--heading2-size);
      font-weight: 600;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      width: 100%;
      padding: 5px 8px;
    }
    
    .menu-container {
      width: 100%;
      max-width: min(95vw, 480px);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 25px;
      padding: 20px 15px;
      backdrop-filter: blur(2px);
    }
    
    ul {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      padding: 10px 5px;
      margin: 8px 0;
    }
    
    .boton {
      border: 3px solid var(--primary-color);
      border-radius: 50px;
      padding: 14px 20px;
      font-size: var(--button-font-size);
      background: linear-gradient(135deg, var(--secondary-color), #ffe4e8);
      color: var(--primary-color);
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      max-width: min(85vw, 300px);
      text-align: center;
      font-weight: bold;
      margin: 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      letter-spacing: 1px;
    }
    
    .boton:hover, .boton:focus {
      transform: scale(1.02);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      background: linear-gradient(135deg, #ffd0d8, #ffc0cb);
      outline: none;
      border-width: 3px;
    }
    
    .boton:active {
      transform: scale(0.98);
    }
    
    a {
      text-decoration: none;
      color: inherit;
      display: block;
      width: 100%;
    }
    
    footer {
      margin-top: 20px;
      text-align: center;
      padding: 15px 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 30px 30px 15px 15px;
    }
    
    /* IMAGEN MÁS GRANDE - Optimizada para Samsung S52 */
    footer img {
      max-width: min(75vw, 280px);
      width: auto;
      height: auto;
      max-height: 180px;
      min-width: 180px;
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }
    
    footer img:hover {
      transform: scale(1.03);
    }
    
    /* Media Query específica para Samsung S52 y dispositivos similares (360px - 412px) */
    @media (min-width: 350px) and (max-width: 420px) {
      :root {
        --base-font-size: 19px;
        --heading1-size: 1.9rem;
        --heading2-size: 1.6rem;
        --button-font-size: 1.2rem;
      }
      
      body {
        padding: 10px 14px;
      }
      
      header {
        padding-top: 12px;
        margin-bottom: 10px;
      }
      
      .boton {
        padding: 15px 22px;
        max-width: 90vw;
      }
      
      footer img {
        max-width: 70vw;
        max-height: 170px;
        min-width: 200px;
      }
      
      .menu-container {
        padding: 25px 15px;
      }
    }
    
    /* Para móviles muy pequeños (hasta 360px) */
    @media (max-width: 360px) {
      :root {
        --base-font-size: 17px;
        --heading1-size: 1.7rem;
        --heading2-size: 1.4rem;
        --button-font-size: 1.05rem;
      }
      
      body {
        padding: 8px 10px;
      }
      
      header {
        margin-bottom: 8px;
      }
      
      h1, h2 {
        margin-bottom: 5px;
      }
      
      .boton {
        padding: 12px 18px;
        max-width: 92vw;
      }
      
      ul {
        gap: 12px;
      }
      
      footer img {
        max-width: 80vw;
        max-height: 150px;
        min-width: 160px;
      }
      
      .menu-container {
        padding: 15px 12px;
      }
    }
    
    /* Para pantallas extremadamente pequeñas (menos de 300px) */
    @media (max-width: 300px) {
      :root {
        --base-font-size: 15px;
        --heading1-size: 1.5rem;
        --heading2-size: 1.2rem;
        --button-font-size: 0.95rem;
      }
      
      .boton {
        padding: 10px 15px;
        border-radius: 40px;
      }
      
      footer img {
        max-width: 85vw;
        max-height: 130px;
        min-width: 140px;
      }
    }
    
    /* Ajustes para orientación horizontal en móviles */
    @media (orientation: landscape) and (max-height: 550px) {
      body {
        padding: 5px 10px;
      }
      
      header {
        padding-top: 5px;
        margin-bottom: 5px;
      }
      
      header h1, header h2 {
        margin-bottom: 3px;
      }
      
      main {
        gap: 8px;
      }
      
      ul {
        gap: 8px;
        padding: 5px;
      }
      
      .boton {
        padding: 8px 15px;
      }
      
      footer {
        margin-top: 10px;
        padding: 8px;
      }
      
      footer img {
        max-height: 100px;
        max-width: 200px;
      }
      
      .menu-container {
        padding: 12px 10px;
      }
    }
    
    /* Ajustes para pantallas más grandes (tablets) */
    @media (min-width: 768px) {
      body {
        padding: 20px;
      }
      
      .boton {
        max-width: 350px;
        padding: 16px 25px;
        font-size: 1.3rem;
      }
      
      footer img {
        max-width: 300px;
        max-height: 220px;
      }
      
      .menu-container {
        max-width: 550px;
      }
    }
    
    /* Mejora de accesibilidad táctil */
    @media (pointer: coarse) {
      .boton {
        touch-action: manipulation;
        cursor: pointer;
      }
      
      .boton:active {
        transform: scale(0.97);
        transition: transform 0.05s;
      }
    }
  </style>
</head>
  
<body>
  <header>
    <h1>📚 Prepárate para los problemas.</h1>
    <h2>🎓 ¡Y más vale que temas!</h2>
  </header>
  
  <main>
    <div class="menu-container">
      <h2>📖 Guías de Estudio</h2>
      <ul>
        <li><button type="button" class="boton"><a href="menu-oct.html">🎯 Octavo Cuatri.</a></button></li>
        <li><button type="button" class="boton"><a href="menu-nov.html">⚡ Noveno Cuatri.</a></button></li>
        <li><button type="button" class="boton"><a href="cloud.html">☁️ Certificaciones Genesys</a></button></li>
      </ul>
    </div>
  </main>

  <footer>
    <img src="Estudiante.png" alt="Alégrate - Estudiante" loading="lazy">  
  </footer>
</body>
</html>
