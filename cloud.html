<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App - Underground Noveno</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    /* IMPORTACIÓN DE FUENTES PUNK AGRESIVAS */
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Stardos+Stencil:wght@400;700&family=Anton&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Special Elite', monospace;
      background-color: #0a0a0a;
      /* Textura de ruido/papel fotocopiado */
      background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW1mZmZlZWVkZGRjY2NiYmJhYWJgYGBfX19eX19dX19cX19bX19aX19ZYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWHrY8jjAAAAD0RSTlMAAQIDBAUGBwgJCgsMDQ4S9f49AAAAnklEQVD42u3T6wqAIBCFYXN393O7/vXW5mIFZfSjX4Y4Lw4zAsv65FfW57bMvAbeZ9UjW/bKzmsWp6C9L7B8Xp+K9m0W56C9T7B8X5+K9ncW66C9T7B8f5+K9m8W66C9X7B8P5+K9ncW66C9f7B8v5+K9ncW66C9D7B835+K9m8W66C9T7B8X5+K9ncW66C9T7B8f5+K9n8W66C9H8u5f9n4L6g5AAAAAElFTkSuQmCC');
      color: #d0d0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* HEADER: ESTILO FANZINE RECORTADO */
    header {
      width: 100%;
      max-width: 600px;
      background: #fff; /* Blanco crudo */
      color: #000;
      padding: 30px;
      margin-bottom: 50px;
      transform: rotate(-1.5deg);
      border: 6px solid #000;
      box-shadow: 12px 12px 0 #bc0000; /* Rojo Óxido */
      /* clip-path para bordes irregulares de tijera */
      clip-path: polygon(1% 2%, 98% 4%, 100% 96%, 2% 99%);
      text-align: center;
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      text-transform: uppercase;
      line-height: 0.9;
      letter-spacing: -1px;
    }

    h2 {
      font-family: 'Stardos Stencil', cursive;
      font-size: 1.2rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* CONTENIDO PRINCIPAL */
    main {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    main h2 {
      color: #bc0000;
      margin-bottom: 40px;
      text-shadow: none;
      border-bottom: 3px solid #bc0000;
      display: inline-block;
      padding: 5px 15px;
      transform: rotate(1deg);
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin-bottom: 25px;
    }

    /* BOTONES INDUSTRIALES / BRUTALISTAS */
    .boton {
      background: #000;
      border: 3px solid #bc0000;
      padding: 0;
      cursor: pointer;
      transition: 0.1s;
      transform: rotate(-0.5deg);
      width: 100%;
      position: relative;
    }

    .boton:hover {
      background: #bc0000;
      transform: translateX(8px) rotate(0.5deg);
      border-color: #fff;
    }

    .boton a {
      display: block;
      padding: 18px 25px;
      text-decoration: none;
      color: #fff;
      font-family: 'Stardos Stencil', sans-serif;
      font-size: 1.3rem;
      text-transform: uppercase;
      font-weight: bold;
    }

    .boton:hover a {
      color: #000;
    }

    /* CLASE HIDDEN */
    .hidden {
      display: none !important;
    }

    /* FOOTER CON IMAGEN ESTILO "GRITTY" */
    footer {
      margin-top: auto;
      padding: 40px 0;
    }

    .img-container {
      background: #1a1a1a;
      padding: 10px;
      border: 2px solid #333;
      transform: rotate(2deg);
      box-shadow: 10px 10px 0 #bc0000;
      clip-path: polygon(2% 0%, 100% 5%, 95% 100%, 0% 90%);
    }

    footer img {
      display: block;
      max-width: 250px;
      height: auto;
      /* Filtro para que el GIF parezca una fotocopia vieja */
      filter: grayscale(100%) contrast(160%) brightness(90%);
    }

    /* --- RESPONSIVIDAD --- */
    @media (max-width: 768px) {
      header {
        padding: 20px;
        transform: rotate(-1deg);
      }
      h1 { font-size: 1.5rem; }
      .boton a { font-size: 1rem; }
      footer img { width: 180px; }
    }
  </style>
</head>

<body>
  <header>
    <h1>Esto es el comienzo jajaja.</h1>
    <h2>¡MÁXIMO ESFUERZO!</h2>
  </header>

  <main>
    <h2>GUÍAS CLOUD_ACCESS</h2>
    <ul>
      <li>
        <button type="button" class="boton">
          <a href="pro.html">⚡ PROFESSIONAL_AUTH ⚡</a>
        </button>
      </li>
      <li>
        <button type="button" class="boton" style="border-color: #666;">
          <a href="index.html" style="color: #666;">⬅ RETURN_TO_HOME</a>
        </button>
      </li>
    </ul>
  </main>

  <footer>
    <div class="img-container">
      <img src="anipoke-pokemon.gif" alt="Maximo Esfuerzo">
    </div>
  </footer>
</body>
</html>
